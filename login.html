<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <form>
      <h1>회원가입/로그인</h1>
      <fieldset class="info">
        <legend>개인정보</legend>
        <label class="name">
          이름 :
          <input type="text" placeholder="이름을 입력해주세요." />
        </label>
        <label class="email">이메일 : <input type="email" /></label>
        <label class="tel">
          전화번호 : <input type="tel" placeholder="010-0000-0000" />
        </label>
        <label class="pwd">
          비밀번호 : <input type="password" placeholder="6자리 이상" />
        </label>
        <button type="submit" class="submit">로그인하기</button>
        <button type="reset" class="reset">다시 제출하기</button>
      </fieldset>
    </form>
  </body>
</html>
