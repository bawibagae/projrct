    <div class="text">
      <h2>우리 산은?</h2>
      <p>
        한반도에 존재하는 산들 중 가장 높은 산은 해발 2,744m의 백두산이며, 남한
        지역만 한정하면 해발 1,947m의 한라산이 가장 높다.<br />
        다만, 해발 2,000m가 넘는 대부분의 고산은 북한 지역에 있어서 한라산은
        한반도 전체로 따지면 순위권에 명함도 내밀지 못한다.
      </p>
